<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judahmer Ateliê | Coleção Dia das Mães</title>
    
    <!-- Fontes Elegantes: Playfair Display (Serifada) e Lato (Sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- Variáveis de Marca e Cores --- */
        :root {
            --bg-color: #FAF9F6; /* Off-white / Bege claríssimo */
            --accent-green: #2B4538; /* Verde Sofisticado Institucional */
            --soft-gold: #D4AF37; /* Dourado Suave */
            --text-main: #333333;
            --text-muted: #666666;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Lato', sans-serif;
            --transition-smooth: 0.4s ease;
        }

        /* --- Resets e Configurações Globais --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Cabeçalho --- */
        .header {
            text-align: center;
            padding: 5rem 2rem 3rem;
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo {
            max-width: 200px;
            height: auto;
            object-fit: contain; 
        }

        .divider {
            border: none;
            border-top: 1px solid var(--soft-gold);
            width: 60px;
            margin: 0 auto 2rem;
        }

        .title {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--accent-green);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 300;
            text-transform: uppercase;
        }

        /* --- Container e Grid de Produtos --- */
        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 5rem;
        }

        .grid {
            display: grid;
            gap: 3rem 2rem;
            grid-template-columns: 1fr; /* Mobile First */
        }

        /* Tablet (2 colunas) */
        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Desktop (3 colunas) */
        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* --- Card de Produto --- */
        .product-card {
            background-color: #FFFFFF;
            padding: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            text-align: center;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .product-image-wrapper {
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background-color: var(--bg-color);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.03);
        }

        .product-name {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .product-separator {
            width: 30px;
            height: 1px;
            background-color: var(--soft-gold);
            margin: 0.5rem auto 1rem;
        }

        .product-price {
            font-size: 1.1rem;
            color: var(--accent-green);
            margin-bottom: 1.5rem;
            font-weight: 400;
            flex-grow: 1;
        }

        /* --- Botão de Conversão (CTA) --- */
        .btn-cta {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all var(--transition-smooth);
            cursor: pointer;
            font-family: var(--font-sans);
        }

        .btn-cta:hover {
            background-color: var(--accent-green);
            color: #FFFFFF;
        }

        /* --- Botão Flutuante WhatsApp --- */
        .fab-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-green);
            color: #FFF;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform var(--transition-smooth), background-color var(--transition-smooth);
            z-index: 1000;
        }

        .fab-whatsapp:hover {
            transform: scale(1.1);
            background-color: #1a2e24;
        }

        /* --- Rodapé --- */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            background-color: #FFFFFF;
            border-top: 1px solid rgba(0,0,0,0.03);
        }

        .footer-text {
            font-family: var(--font-serif);
            color: var(--accent-green);
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 1rem;
        }

        .footer-icon {
            color: var(--soft-gold);
            font-size: 1.2rem;
        }

        /* --- Classes de Animação Via JS --- */
        .fade-in-onload {
            animation: fadeIn 1.2s ease-out forwards;
        }

        .scroll-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .scroll-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header class="header fade-in-onload">
        <div class="logo-container">
            <img src="imagens/logo.png" alt="Judahmer Ateliê" class="logo">
        </div>
        <hr class="divider">
        <h1 class="title">Coleção Especial: Dia das Mães</h1>
        <h2 class="subtitle">AMOR QUE INSPIRA. PRESENTE QUE ETERNIZA.</h2>
    </header>

    <!-- Container Principal do Catálogo -->
    <main class="catalog-container">
        <div id="product-grid" class="grid"></div>
    </main>

    <!-- Botão Flutuante do WhatsApp -->
    <a href="https://wa.me/5500000000000" class="fab-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Fale conosco via WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
    </a>

    <!-- Rodapé -->
    <footer class="footer">
        <p class="footer-text">Feito para quem sempre cuidou de você. Feliz Dia das Mães!</p>
        <div class="footer-icon">✧</div>
    </footer>

    <!-- Scripts da Aplicação -->
    <script>
        /**
         * Configuração Geral
         */
        const numeroWhatsApp = "5511999999999"; 

        /**
         * Regra de Negócios: Base de Dados de Produtos
         */
        const produtos = [
            { id: 1, nome: "Colar Coração Eterno", preco: "R$ 350,00", imagem: "imagens/imagem1.jpg" },
            { id: 2, nome: "Colar Pérola Clássica", preco: "R$ 420,00", imagem: "imagens/imagem2.jpg" },
            { id: 3, nome: "Colar Gota Dourada", preco: "R$ 290,00", imagem: "imagens/imagem3.jpg" }
        ];

        // Automação para gerar do ID 4 ao 26
        for (let i = 4; i <= 26; i++) {
            produtos.push({
                id: i,
                nome: `Colar Coleção Mães ${i.toString().padStart(2, '0')}`,
                preco: "R$ 390,00",
                imagem: `imagens/imagem${i}.jpg`
            });
        }

        /**
         * Função de Renderização (Arquitetura Data-Driven)
         */
        function renderizarCatalogo() {
            const gridContainer = document.getElementById('product-grid');
            gridContainer.innerHTML = '';

            produtos.forEach((produto) => {
                const mensagem = `Olá! Tenho interesse no ${produto.nome} da Coleção Dia das Mães.`;
                const linkWhatsApp = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensagem)}`;

                const card = document.createElement('article');
                card.classList.add('product-card', 'scroll-fade');

                card.innerHTML = `
                    <div class="product-image-wrapper">
                        <img src="${produto.imagem}" alt="Fotografia do ${produto.nome}" class="product-image" loading="lazy">
                    </div>
                    <h3 class="product-name">${produto.nome}</h3>
                    <div class="product-separator"></div>
                    <p class="product-price">${produto.preco}</p>
                    <a href="${linkWhatsApp}" target="_blank" rel="noopener noreferrer" class="btn-cta">
                        Comprar via WhatsApp
                    </a>
                `;

                gridContainer.appendChild(card);
            });

            iniciarAnimacoesDeScroll();
        }

        /**
         * Comportamento Visual: Animação suave ao rolar a página
         */
        function iniciarAnimacoesDeScroll() {
            const elementosAnimados = document.querySelectorAll('.scroll-fade');

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                root: null,
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            });

            elementosAnimados.forEach(elemento => observer.observe(elemento));
        }

        // Inicializa a aplicação
        document.addEventListener('DOMContentLoaded', renderizarCatalogo);
    </script>
</body>
</html>
