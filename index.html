<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Dahmer Ateliê | Coleção Dia das Mães</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-institucional: #7f8b5a;
            --fundo-site: #FAF9F6;
            --texto-principal: #2C3E2D;
            --texto-secundario: #7A7A7A;
            --detalhe-dourado: #D4AF37;
            --transicao-suave: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--fundo-site);
            color: var(--texto-principal);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transicao-suave);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        header {
            background-color: var(--verde-institucional);
            padding: 50px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container img {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }

        .divisor-header {
            width: 80px;
            height: 1px;
            background-color: var(--detalhe-dourado);
            margin: 20px 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .main-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 24px;
        }

        .product-grid {
            display: grid;
            gap: 48px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            transition: var(--transicao-suave);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .image-box {
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background-color: #f8f8f8;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transicao-suave);
        }

        .card:hover .image-box img {
            transform: scale(1.05);
        }

        .info-box {
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 12px;
            color: var(--texto-principal);
            font-weight: 400;
        }

        .divisor-card {
            width: 40px;
            height: 1px;
            background-color: var(--detalhe-dourado);
            margin: 12px 0;
            opacity: 0.6;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--texto-secundario);
            margin-bottom: 25px;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: var(--verde-institucional);
            border: 1.5px solid var(--verde-institucional);
            padding: 14px 20px;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: var(--transicao-suave);
            width: 100%;
            font-weight: 500;
        }

        .btn-whatsapp:hover {
            background-color: var(--verde-institucional);
            color: white;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background-color: white;
            color: var(--verde-institucional);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-decoration: none;
            z-index: 9999;
            transition: var(--transicao-suave);
            border: 1px solid var(--verde-institucional);
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(5deg);
        }

        footer {
            padding: 100px 20px;
            text-align: center;
            background-color: white;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .footer-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            margin-bottom: 15px;
            color: var(--texto-principal);
        }

        .footer-sub {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--detalhe-dourado);
            font-weight: 400;
        }

        .heart-icon {
            display: inline-block;
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--verde-institucional);
        }
    </style>
</head>
<body>

    <header class="fade-in">
        <div class="logo-container">
            <img src="logo.png" alt="Ju Dahmer Ateliê">
        </div>
        <div class="divisor-header"></div>
        <h1>Coleção Especial: Dia das Mães</h1>
        <h2>Amor que inspira. Presente que eterniza.</h2>
    </header>

    <main class="main-container">
        <div class="product-grid" id="productGrid"></div>
    </main>

    <a href="https://wa.me/41988367660" target="_blank" class="whatsapp-float">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <footer class="fade-in">
        <p class="footer-text">Feito para quem sempre cuidou de você.</p>
        <p class="footer-sub">Feliz Dia das Mães!</p>
        <div class="heart-icon">♥</div>
    </footer>

    <script>
        const CONFIG = {
            whatsapp: "41988367660",
            textoPadrao: "Olá, tudo bem? Tenho interesse no "
        };

        // Jp, é aqui que você vai mexer no nome do produto, no preço e na imagem se precisar trocar.
        const produtos = [
            { id: 1, nome: "Colar Flor de Pérola", preco: "R$ 87,00", imagem: "imagem 1.jfif" },
            { id: 2, nome: "Colar Nó Náutico", preco: "R$ 42,00", imagem: "imagem 2.jfif" },
            { id: 3, nome: "Colar Onda Celeste", preco: "R$ 28,00", imagem: "imagem 3.jfif" },
            { id: 4, nome: "Colar Coral Radiante", preco: "R$ 28,00", imagem: "imagem 4.jfif" },
            { id: 5, nome: "Colar Coração de Opala", preco: "R$ 42,00", imagem: "imagem 5.jfif" },
            { id: 6, nome: "Colar Medalha de Outono", preco: "R$ 87,00", imagem: "imagem 6.jfif" },
            { id: 7, nome: "Colar Enlace Natureza", preco: "R$ 68,00", imagem: "imagem 7.jfif" },
            { id: 8, nome: "Colar Nó Sálvia", preco: "R$ 68,00", imagem: "imagem 8.jfif" },
            { id: 9, nome: "Colar Trama Avelã", preco: "R$ 35,00", imagem: "imagem 9.jfif" },
            { id: 10, nome: "Colar Nós Terracota", preco: "R$ 45,00", imagem: "imagem 10.jfif" },
            { id: 11, nome: "Colar Coração Bordô", preco: "R$ 75,00", imagem: "imagem 11.jfif" },
            { id: 12, nome: "Colar Olho Grego Marinho", preco: "R$ 55,00", imagem: "imagem 12.jfif" },
            { id: 13, nome: "Colar Duplo Desejo", preco: "R$ 70,00", imagem: "imagem 13.jfif" },
            { id: 14, nome: "Colar Gravatinha Ébano", preco: "R$ 35,00", imagem: "imagem 14.jfif" },
            { id: 15, nome: "Colar Gravatinha Magenta", preco: "R$ 42,00", imagem: "imagem 15.jfif" },
            { id: 16, nome: "Colar Nó Rubi", preco: "R$ 42,00", imagem: "imagem 16.jfif" },
            { id: 17, nome: "Colar Trama Noturna", preco: "R$ 55,00", imagem: "imagem 17.jfif" },
            { id: 18, nome: "Colar Trama Solar", preco: "R$ 45,00", imagem: "imagem 18.jfif" },
            { id: 19, nome: "Colar Gota de Resina", preco: "R$ 58,00", imagem: "imagem 19.jfif" },
            { id: 20, nome: "Colar Espiral Neve", preco: "R$ 42,00", imagem: "imagem 20.jfif" },
            { id: 21, nome: "Colar Trama Zigue-Zague", preco: "R$ 28,00", imagem: "imagem 21.jfif" },
            { id: 22, nome: "Colar Medalha Primavera", preco: "R$ 87,00", imagem: "imagem 22.jfif" },
            { id: 23, nome: "Colar Âmbar Clássico", preco: "R$ 55,00", imagem: "imagem 23.jfif" },
            { id: 24, nome: "Colar Gravatinha Terracota", preco: "R$ 35,00", imagem: "imagem 24.jfif" },
            { id: 25, nome: "Colar Nós Entrelaçados Rubi", preco: "R$ 67,00", imagem: "imagem 25.jfif" },
            { id: 26, nome: "Colar Espiral Magenta", preco: "R$ 42,00", imagem: "imagem 26.jfif" }
        ];

        function renderCatalogo() {
            const grid = document.getElementById('productGrid');
            
            produtos.forEach(product => {
                const message = encodeURIComponent(`${CONFIG.textoPadrao}${product.nome}`);
                const link = `https://wa.me/${CONFIG.whatsapp}?text=${message}`;
                
                const card = document.createElement('div');
                card.className = 'card fade-in';
                card.innerHTML = `
                    <div class="image-box">
                        <img src="${product.imagem}" alt="${product.nome}" loading="lazy">
                    </div>
                    <div class="info-box">
                        <h3 class="product-name">${product.nome}</h3>
                        <div class="divisor-card"></div>
                        <p class="product-price">${product.preco}</p>
                        <a href="${link}" target="_blank" class="btn-whatsapp">Comprar via WhatsApp</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function scrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        }

        window.onload = () => {
            renderCatalogo();
            scrollObserver();
            setTimeout(() => {
                document.querySelector('header').classList.add('visible');
                document.querySelector('footer').classList.add('visible');
            }, 100);
        };
    </script>
</body>
</html>
